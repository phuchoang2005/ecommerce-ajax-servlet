services:
  tomcat:
    image: tomcat:10-jdk21
    container_name: tomcat-dev
    ports:
      - "8080:8080"
    volumes:
      - ./target/docker-servlet:/usr/local/tomcat/webapps/ROOT
      - ./logs:/usr/local/tomcat/logs
    restart: no
  mysql:
    image: mysql:8.0
    container_name: mysql-dev
    restart: no
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data:

