openapi: 3.0.3
info:
  title: E-commerce API
  description: Tài liệu API cho hệ thống thương mại điện tử
  version: 1.0.0

servers:
  - url: http://localhost:8080/
    description: Local server

tags:
  - name: Auth
    description: Các API liên quan đến xác thực và quản lý tài khoản

paths:
  /auth/register:
    post:
      summary: Đăng ký tài khoản người dùng mới
      description: Nhận thông tin người dùng và tạo tài khoản mới trên hệ thống thương mại điện tử.
      tags:
        - Auth

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'

      responses:
        '201':
          description: Đăng ký thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterApiResponse'

        '400':
          description: Dữ liệu đầu vào không hợp lệ (Validation Error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                timestamp: "2026-04-12T16:20:10"
                status: 400
                error: "Bad Request"
                message: "Mật khẩu phải chứa ít nhất 8 ký tự"
                path: "/auth/register"

        '409':
          description: Email hoặc số điện thoại đã tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              example:
                timestamp: "2026-04-12T16:20:10"
                status: 409
                error: "Conflict"
                message: "Email này đã được sử dụng"
                path: "/auth/register"

        '500':
          description: Lỗi máy chủ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

components:
  schemas:

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - fullName
        - username
      properties:
        username:
          type: string
          description: Username trên hệ thống
          example: "bosshp2000"

        fullName:
          type: string
          description: Họ và tên đầy đủ
          example: "Nguyễn Văn A"

        email:
          type: string
          format: email
          description: Email đăng nhập
          example: "nguyenvana@example.com"

        password:
          type: string
          format: password
          description: Mật khẩu
          example: "StrongP@ssw0rd!"

        address:
          type: string
          description: Nơi ở

        phone:
          type: string
          description: Số điện thoại
          example: "0987654321"


    RegisterResponse:
      type: object
      properties:
        username:
          type: string
          example: "bosshp2000"

        email:
          type: string
          format: email
          example: "nguyenvana@example.com"


    RegisterApiResponse:
      type: object
      properties:
        timestamp:
          type: string
          description: Thời gian phản hồi
          example: "2026-04-12T16:20:10"

        status:
          type: integer
          description: HTTP status code
          example: 201

        message:
          type: string
          example: "Đăng ký tài khoản thành công"

        data:
          $ref: '#/components/schemas/RegisterResponse'


    ApiErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          description: Thời điểm lỗi xảy ra
          example: "2026-04-12T16:20:10"

        status:
          type: integer
          description: HTTP status code
          example: 400

        error:
          type: string
          description: Tên lỗi HTTP
          example: "Bad Request"

        message:
          type: string
          description: Thông báo lỗi chi tiết
          example: "Email này đã được sử dụng"

        path:
          type: string
          description: Endpoint gây lỗi
          example: "/auth/register"