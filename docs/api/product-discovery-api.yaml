openapi: 3.0.3
info:
  title: E-Commerce Catalog API
  version: 1.0.0
  description: Product discovery APIs for Ajax/Servlet project
servers:
  - url: http://localhost:8080/
    description: Local development server

tags:
  - name: Catalog
    description: Product browsing and discovery operations

paths:
  /products:
    get:
      tags:
        - Catalog
      summary: Search and browse products with filtering and pagination
      parameters:
        - name: keyword
          in: query
          required: false
          schema:
            type: string
          example: "iphone"
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
          example: 2
        - name: page
          in: query
          description: Page number (starts from 0)
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            default: 12
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [id, name, price]
            default: id
        - name: order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc

      responses:
        "200":
          description: Successfully retrieved product list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ProductPage"

        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /products/{id}:
    get:
      tags:
        - Catalog
      summary: Get detailed information of a specific product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 101
      responses:
        "200":
          description: Product details retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Product"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /categories:
    get:
      tags:
        - Catalog
      summary: Retrieve all available categories
      responses:
        "200":
          description: Category list retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Category"

components:
  schemas:
    # Base response for all successful calls
    ApiResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        timestamp:
          type: string
          format: date-time
          example: "2026-04-12T13:00:00Z"
        message:
          type: string
          example: "Operation completed successfully"

    # Standard error response
    ApiErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: "error"
        timestamp:
          type: string
          format: date-time
        errorCode:
          type: string
          example: "PRODUCT_NOT_FOUND"
        message:
          type: string
          example: "The requested product does not exist"
        path:
          type: string
          example: "/api/products/999"

    Product:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        unit:
          type: string
        price:
          type: number
          format: double
        stock:
          type: integer
        imageUrl:
          type: string
        categoryId:
          type: integer

    Category:
      type: object
      properties:
        categoryId:
          type: integer
        categoryName:
          type: string

    ProductPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        pagination:
          type: object
          properties:
            page:
              type: integer
            size:
              type: integer
            totalElements:
              type: integer
            totalPages:
              type: integer

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"
    InternalError:
      description: Internal server failure
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorResponse"